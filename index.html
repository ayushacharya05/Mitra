<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mitra AI – Your Intelligent Companion</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Devanagari:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      --ink: #0a0a0f;
      --paper: #f5f3ee;
      --gold: #c8a96e;
      --gold-light: #e8c98a;
      --teal: #2a9d8f;
      --accent: #e76f51;
      --muted: #8a8478;
      --border: rgba(212, 207, 197, 0.2);
      --glass: rgba(255, 255, 255, 0.03);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Sora', 'Noto Sans Devanagari', sans-serif;
      background: var(--ink);
      color: var(--paper);
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* Grainy Texture Overlay */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999;
    }

    /* Navigation */
    nav { 
      position: fixed; top: 0; left: 0; right: 0; z-index: 100; 
      padding: 1.1rem 2.5rem; display: flex; align-items: center; justify-content: space-between; 
      border-bottom: 1px solid rgba(200,169,110,.15); 
      background: rgba(10,10,15,.8); backdrop-filter: blur(20px); 
    }
    .nav-brand { display: flex; align-items: center; gap: .6rem; text-decoration: none; }
    .brand-dot { 
      width: 24px; height: 24px; border-radius: 50%; 
      background: conic-gradient(var(--gold), var(--teal), var(--gold)); 
      animation: spin 6s linear infinite; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .brand-name { font-size: 1.2rem; font-weight: 700; color: var(--paper); }
    .brand-name span { color: var(--gold); }

    /* Hero Section */
    .hero { 
      min-height: 100vh; display: flex; flex-direction: column; 
      justify-content: center; align-items: center; padding: 2rem; 
      text-align: center; position: relative;
    }
    .hero-title { font-size: 4.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 1.5rem; }
    .line-gold { color: var(--gold); }
    .line-teal { color: var(--teal); }
    .hero-sub { color: var(--muted); max-width: 600px; margin-bottom: 2.5rem; font-size: 1.1rem; }

    /* Buttons */
    .btn-primary-gold {
      background: var(--gold); color: var(--ink); 
      padding: 1rem 2rem; border-radius: 50px; font-weight: 700;
      text-decoration: none; transition: 0.3s; display: inline-block;
    }
    .btn-primary-gold:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(200,169,110,0.2); color: var(--ink); }

    /* Chat Modal & Window */
    .modal-content { 
      background: #121218; border: 1px solid var(--border); border-radius: 24px; 
      overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .modal-header { border-bottom: 1px solid var(--border); padding: 1.2rem; display: flex; align-items: center; }
    .modal-bot-avatar { width: 40px; height: 40px; background: var(--gold); border-radius: 12px; display: grid; place-items: center; }
    
    #chatWindow { 
      height: 450px; overflow-y: auto; padding: 1.5rem; 
      display: flex; flex-direction: column; gap: 1rem; 
      background: rgba(0,0,0,0.2);
    }

    /* Chat Bubbles */
    .msg { display: flex; gap: 0.8rem; animation: fadeInUp 0.4s ease forwards; }
    .msg.user { flex-direction: row-reverse; }
    .bubble { 
      max-width: 80%; padding: 0.8rem 1.2rem; border-radius: 18px; 
      font-size: 0.95rem; position: relative; 
    }
    .msg.bot .bubble { 
      background: var(--glass); border: 1px solid var(--border); 
      color: var(--paper); border-bottom-left-radius: 4px; 
    }
    .msg.user .bubble { 
      background: var(--gold); color: var(--ink); font-weight: 500;
      border-bottom-right-radius: 4px; 
    }

    /* Language Switcher */
    .lang-switcher { background: rgba(255,255,255,0.05); border-radius: 30px; padding: 4px; display: flex; }
    .lang-btn { 
      border: none; background: transparent; color: var(--muted); 
      padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; transition: 0.3s;
    }
    .lang-btn.active { background: var(--gold); color: var(--ink); }

    /* Input Area */
    .chat-input-row { 
      padding: 1.2rem; border-top: 1px solid var(--border); 
      display: flex; gap: 0.8rem; align-items: center; 
    }
    #userInput { 
      flex: 1; background: var(--glass); border: 1px solid var(--border); 
      border-radius: 15px; padding: 0.8rem 1.2rem; color: white; resize: none; outline: none;
    }
    #sendBtn { 
      background: var(--teal); color: white; border: none; 
      width: 45px; height: 45px; border-radius: 50%; transition: 0.3s;
    }
    #sendBtn:hover { transform: scale(1.1); background: var(--gold); }

    /* Typing Indicator */
    .typing-dots span { 
      display: inline-block; width: 6px; height: 6px; 
      background: var(--gold); border-radius: 50%; margin-right: 3px;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="#">
    <div class="brand-dot"></div>
    <span class="brand-name">Mitra <span>AI</span></span>
  </a>
  <div class="lang-switcher">
    <button class="lang-btn active" id="btnEn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btnNp" onclick="setLang('np')">नेपाली</button>
  </div>
</nav>

<section class="hero">
  <h1 class="hero-title">
    Meet <span class="line-gold">Mitra</span><br/>
    Your <span class="line-teal">Bilingual</span> Companion
  </h1>
  <p class="hero-sub">The smartest way to communicate in English and नेपाली. Powered by advanced Gemini AI for lightning-fast responses.</p>
  <a href="#" class="btn-primary-gold" data-bs-toggle="modal" data-bs-target="#chatModal">✦ Start Chatting</a>
</section>

<div class="modal fade" id="chatModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width:550px;">
    <div class="modal-content">
      <div class="modal-header">
        <div class="d-flex align-items-center gap-3 flex-grow-1">
          <div class="modal-bot-avatar">✦</div>
          <div>
            <div style="font-weight: 700; font-size: 1rem;">Mitra AI</div>
            <div style="font-size: 0.75rem; color: var(--teal);" id="statusText">● Online · English Mode</div>
          </div>
        </div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div id="chatWindow"></div>

      <div class="chat-input-row">
        <textarea id="userInput" placeholder="Type your message..." rows="1"></textarea>
        <button id="sendBtn">➤</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // 1. API CONFIG
  const API_KEY = "AIzaSyDu0P4piTAGcmMuuChfOLul1klKNWAKYDw";
  const ENDPOINT = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

  const LANG = {
    en: {
      welcome: "Hello! I am Mitra, your AI assistant. How can I help you today?",
      system: "You are Mitra AI, a helpful bilingual assistant. Use a professional yet friendly tone. Respond in English.",
      error: "I'm having trouble connecting. Try again, bro!"
    },
    np: {
      welcome: "नमस्ते! म मित्र एआई हुँ। म तपाईंलाई आज कसरी मद्दत गर्न सक्छु?",
      system: "You are Mitra AI. Respond exclusively in Nepali language (Devanagari). Keep it natural.",
      error: "माफ गर्नुहोस्, सम्पर्क हुन सकेन। फेरि प्रयास गर्नुहोस्!"
    }
  };

  // 2. APP STATE
  let currentLang = 'en';
  let history = []; // Stores context

  const chatWin = document.getElementById('chatWindow');
  const userInp = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const status   = document.getElementById('statusText');

  // 3. LOGIC
  function initChat() {
    chatWin.innerHTML = '';
    history = [];
    addMsg('bot', LANG[currentLang].welcome);
  }

  function setLang(lang) {
    currentLang = lang;
    document.getElementById('btnEn').classList.toggle('active', lang === 'en');
    document.getElementById('btnNp').classList.toggle('active', lang === 'np');
    status.innerText = lang === 'en' ? "● Online · English Mode" : "● अनलाइन · नेपाली मोड";
    initChat();
  }

  async function handleSend() {
    const text = userInp.value.trim();
    if (!text || sendBtn.disabled) return;

    // UI Updates
    userInp.value = '';
    userInp.style.height = 'auto';
    addMsg('user', text);
    showTyping();
    sendBtn.disabled = true;

    try {
      const response = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [
            ...history,
            { role: "user", parts: [{ text: `${LANG[currentLang].system} User asks: ${text}` }] }
          ],
          generationConfig: { temperature: 0.8, maxOutputTokens: 1000 }
        })
      });

      const data = await response.json();
      removeTyping();

      if (data.error) {
        addMsg('bot', `⚠️ API Error: ${data.error.message}`);
      } else {
        const reply = data.candidates[0].content.parts[0].text;
        
        // Push to local history for context awareness
        history.push({ role: "user", parts: [{ text: text }] });
        history.push({ role: "model", parts: [{ text: reply }] });

        addMsg('bot', reply);
      }
    } catch (err) {
      removeTyping();
      addMsg('bot', LANG[currentLang].error);
    } finally {
      sendBtn.disabled = false;
      userInp.focus();
    }
  }

  // 4. UI HELPERS
  function addMsg(type, text) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.innerHTML = `<div class="bubble">${text}</div>`;
    chatWin.appendChild(div);
    chatWin.scrollTop = chatWin.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.id = 'typing';
    div.className = 'msg bot';
    div.innerHTML = `<div class="bubble typing-dots"><span></span><span></span><span></span></div>`;
    chatWin.appendChild(div);
    chatWin.scrollTop = chatWin.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  // 5. LISTENERS
  sendBtn.addEventListener('click', handleSend);
  userInp.addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }});
  
  // Auto-resize input
  userInp.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = (this.scrollHeight) + 'px';
  });

  // Start
  window.onload = initChat;
</script>

</body>
</html>
