<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITRA AI - Desktop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;550&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #171717;
            --main-bg: #ffffff;
            --user-bubble: #007aff;
            --ai-bubble: #f4f4f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background: var(--main-bg);
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            color: #ececec;
            display: flex;
            flex-direction: column;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .new-chat-btn {
            border: 1px solid #4d4d4d;
            background: transparent;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: left;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .new-chat-btn:hover { background: #2d2d2d; }

        /* Main Chat Area */
        .chat-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 15px 30px;
            border-bottom: 1px solid #efefef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 550;
            background: linear-gradient(90deg, #111, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 40px 10%;
            display: flex;
            flex-direction: column;
            gap: 25px;
            scroll-behavior: smooth;
        }

        /* Messages */
        .message {
            display: flex;
            gap: 15px;
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
        }

        .message.user { justify-content: flex-end; }
        
        .message .icon {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            object-fit: cover;
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.6;
            max-width: 75%;
        }

        .user .bubble {
            background-color: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai .bubble {
            background-color: var(--ai-bubble);
            color: #222;
            border: 1px solid #e5e5e5;
            border-bottom-left-radius: 2px;
        }

        /* Input area */
        .input-area {
            padding: 20px 10% 40px 10%;
            background: linear-gradient(transparent, white 40%);
        }

        .input-container {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            padding: 10px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .input-container input {
            flex: 1;
            border: none;
            outline: none;
            padding: 8px;
            font-size: 16px;
        }

        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 18px;
            transition: 0.2s;
        }
        
        .on { color: #28a745; }
        .off { color: #ccc; }

        /* Modal */
        #aboutOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .about-card {
            background: white;
            width: 450px;
            padding: 30px;
            border-radius: 20px;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .chat-box { padding: 20px 5%; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <button class="new-chat-btn" onclick="window.location.reload()"><i class="fas fa-plus me-2"></i> New Chat</button>
        <div class="flex-grow-1"></div>
        <hr style="border-color: #333;">
        <button class="btn text-light text-start p-2" onclick="toggleAbout()"><i class="fas fa-info-circle me-2"></i> About Mitra</button>
        <button class="btn text-light text-start p-2"><i class="fas fa-envelope me-2"></i> Support</button>
    </div>

    <div class="chat-wrapper">
        <div class="header">
            <h1>MITRA</h1>
            <div id="status" class="small text-muted">Ready</div>
        </div>

        <div class="chat-box" id="chatBox">
            </div>

        <div class="input-area">
            <div class="input-container">
                <button class="control-btn off" id="speechToggleBtn" onclick="toggleSpeech()" title="Toggle Voice Output">
                    <i class="fas fa-volume-up"></i>
                </button>
                <button class="control-btn" onclick="startVoiceInput()" title="Voice Input">
                    <i class="fas fa-microphone text-primary"></i>
                </button>
                <input type="text" id="question" placeholder="Ask Mitra anything..." onkeypress="if(event.key==='Enter') askAI()">
                <button class="control-btn text-primary" onclick="askAI()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="aboutOverlay" onclick="toggleAbout()">
    <div class="about-card" onclick="event.stopPropagation()">
        <h3>About Mitra AI</h3>
        <p class="mt-3">A specialized AI companion optimized for Nepali users.</p>
        <ul class="mt-2 small">
            <li>Developed by <strong>Ayush Acharya</strong></li>
            <li>Real-time Web Search</li>
            <li>Nepali & English Support</li>
        </ul>
        <button class="btn btn-dark w-100 mt-4" onclick="toggleAbout()">Close</button>
    </div>
</div>

<script>
    let isSpeechEnabled = false;

    // --- Core Logic ---
    function toggleSpeech() {
        isSpeechEnabled = !isSpeechEnabled;
        const btn = document.getElementById("speechToggleBtn");
        btn.classList.toggle('on', isSpeechEnabled);
        btn.classList.toggle('off', !isSpeechEnabled);
    }

    function toggleAbout() {
        const modal = document.getElementById('aboutOverlay');
        modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
    }

    function fuzzyMatch(input, target) {
        return input.toLowerCase().split(" ").every(word => target.toLowerCase().includes(word));
    }

    async function fetchWebSearchResult(query) {
        document.getElementById('status').innerText = "Searching web...";
        const apiUrl = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json`;
        try {
            const response = await fetch(apiUrl);
            const data = await response.json();
            document.getElementById('status').innerText = "Ready";
            return data.AbstractText || "I couldn't find a direct answer. Try asking differently!";
        } catch (e) {
            return "Connection error. Please check your internet.";
        }
    }

    const predefinedAnswers = [
        { "keywords": ["hello", "hi", "hey"], "answer": "Hi! How can I assist you today?\nनमस्ते! म तपाईंलाई आज के सहयोग गर्न सक्छु?" },
        { "keywords": ["who are you", "name"], "answer": "I'm Mitra, your AI friend, created by Ayush Acharya." },
        { "keywords": ["who developed you", "creator"], "answer": "I was created by Ayush Acharya." },
        { "keywords": ["joke"], "answer": "Why was the math book sad? Too many problems!" }
    ];

    function getFlexibleAnswer(question) {
        for (let item of predefinedAnswers) {
            for (let keyword of item.keywords) {
                if (fuzzyMatch(question, keyword)) return item.answer;
            }
        }
        return null;
    }

    async function askAI() {
        const input = document.getElementById("question");
        const query = input.value.trim();
        if (!query) return;

        addMessage("user", query);
        input.value = "";

        let response = getFlexibleAnswer(query);
        
        if (!response) {
            response = await fetchWebSearchResult(query);
        }

        setTimeout(() => {
            addMessage("ai", response);
            if (isSpeechEnabled) speakText(response);
        }, 500);
    }

    function addMessage(sender, text) {
        const chatBox = document.getElementById("chatBox");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender}`;

        const icon = sender === "user" 
            ? "https://cdn1.iconfinder.com/data/icons/mix-color-3/502/Untitled-7-512.png" 
            : "https://ayushacharya5.com.np/mitra/images/icon.png";

        msgDiv.innerHTML = `
            ${sender === 'ai' ? `<img src="${icon}" class="icon">` : ''}
            <div class="bubble">${text}</div>
            ${sender === 'user' ? `<img src="${icon}" class="icon">` : ''}
        `;

        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // --- Voice Logic ---
    function startVoiceInput() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US'; 
        recognition.onstart = () => document.getElementById('status').innerText = "Listening...";
        recognition.onresult = (event) => {
            document.getElementById("question").value = event.results[0][0].transcript;
            askAI();
        };
        recognition.onend = () => document.getElementById('status').innerText = "Ready";
        recognition.start();
    }

    function speakText(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        const hasDevanagari = /[\u0900-\u097F]/.test(text);
        utterance.lang = hasDevanagari ? 'hi-IN' : 'en-US';
        window.speechSynthesis.speak(utterance);
    }

    // Welcome Message
    window.onload = () => addMessage("ai", "Namaste! I am Mitra. How can I help you today?");
</script>
</body>
</html>
